/////////////////////////////////////
// 🎯 CS2 AUTOEXEC – Max Viewmodel & Min Bob
/////////////////////////////////////

// 🎯 Mouse
sensitivity "1.13"
zoom_sensitivity_ratio_mouse "0.5"
m_rawinput "1"
m_customaccel "0"

// 🎮 FPS & Performans (170 Hz için ideal 300 FPS)
fps_max "300"

// 🔊 Ses (Pipewire optimize – kararlı gecikme)
volume "0.5"
snd_mixahead "0.025"

// 🔫 Viewmodel (MAKSİMUM UZAKLIK – Tüm değerler sınırda)
viewmodel_fov "68"            // Maksimum FOV
viewmodel_offset_x "2.5"      // Sağa en uzak (max)
viewmodel_offset_y "2"        // İleriye en uzak (max)
viewmodel_offset_z "-2"       // Aşağıya en uzak (min değer)

// 🔄 Bob (SALLANTI MİNİMUM – En yavaş ve en az hareket)
cl_bob_lower_amt "5"          // Minimum yürüme sallantısı
cl_bobamt_lat "0.1"           // Yatay sallantı sıfıra yakın
cl_bobamt_vert "0.1"          // Dikey sallantı sıfıra yakın
cl_bobcycle "0.1"             // Döngü en yavaş (0.1)

// 🎯 Crosshair (temiz, statik)
cl_crosshairstyle "4"
cl_crosshairsize "2.5"
cl_crosshairthickness "0.5"
cl_crosshairgap "-2"
cl_crosshair_drawoutline "0"

// 🎮 Keybindler
bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"
bind "space" "+jump"

bind "shift" "+sprint"
bind "ctrl" "+duck"

bind "mouse4" "slot7"   // Flash
bind "mouse5" "slot8"   // Smoke

bind "q" "lastinv"

// Bomba düşürme (alias ile güvenli)
alias +dropc4 "slot5; +use"
alias -dropc4 "-use; drop"
bind "c" "+dropc4"

// 🗳️ Oylama (CS2 güncel komutlar)
bind "o" "vote option1"   // Evet
bind "p" "vote option2"   // Hayır

// 🗺️ Radar
cl_radar_always_centered "0"
cl_radar_scale "0.4"
cl_hud_radar_scale "1.15"

// 🧼 Görsel temizlik
cl_autohelp "0"
gameinstructor_enable "0"

// 📌 Kalıcılık için EN ALTTA
host_writeconfig
echo "CS2 MAX VIEWMODEL CFG Yüklendi!"
